<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi UI Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Biblioteca de Componentes UI</h1>

    <section>
        <h2>Botones</h2>
        <button class="btn1">Guardar</button>
        <button class="btn2">Editar</button>
        <button class="btn3">Eliminar</button>
    </section>

    <section>
        <h2>Formulario</h2>

        <input type="text" placeholder="Ingrese su nombre">
        <br><br>

        <input type="email" placeholder="Ingrese su correo">
        <br><br>

        <textarea placeholder="Escriba un mensaje"></textarea>
        <br><br>

        <button class="btn1">Enviar</button>
    </section>

    <section>
        <h2>Card</h2>

        <div class="card">
            <h3>Incidente #001</h3>
            <p>Error en el sistema principal.</p>
        </div>
    </section>

    <section>
        <h2>Alertas</h2>

        <div class="success">Sistema funcionando correctamente.</div>
        <br>

        <div class="warning">Advertencia de mantenimiento.</div>
        <br>

        <div class="danger">Error crítico detectado.</div>
    </section>

</body>
</html>
