<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Kit - Design System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Biblioteca de Componentes UI</h1>

    <section>
        <h2>Botones</h2>
        <button class="btn primary">Guardar</button>
        <button class="btn secondary">Editar</button>
        <button class="btn danger">Eliminar</button>
    </section>

    <section>
        <h2>Formulario</h2>

        <input type="text" placeholder="Ingrese su nombre">
        <br><br>

        <input type="email" placeholder="Ingrese su correo">
        <br><br>

        <textarea placeholder="Escriba un mensaje"></textarea>
        <br><br>

        <button class="btn primary">Enviar</button>
    </section>

    <section>
        <h2>Card</h2>

        <div class="card">
            <h3>Incidente #001</h3>
            <p>Error en el sistema principal.</p>

            <br>
            <span class="badge high">Alta</span>
            <span class="badge medium">Media</span>
            <span class="badge low">Baja</span>
        </div>
    </section>

    <section>
        <h2>Alertas</h2>

        <div class="alert success">Sistema funcionando correctamente.</div>
        <br>

        <div class="alert warning">Advertencia de mantenimiento.</div>
        <br>

        <div class="alert danger">Error crítico detectado.</div>
    </section>

</body>
</html>
